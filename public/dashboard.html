<!DOCTYPE html>
<html>
<head>
<title>NLN Dispatch Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body {
font-family: Arial, sans-serif;
background: #0f172a;
color: white;
margin: 0;
padding: 20px;
}

h1 {
margin-bottom: 20px;
}

.card {
background: #1e293b;
padding: 15px;
border-radius: 12px;
margin-bottom: 15px;
border: 1px solid #334155;
}

input, select, button {
padding: 8px 10px;
margin: 5px;
border-radius: 6px;
border: none;
}

input, select {
min-width: 140px;
}

button {
cursor: pointer;
font-weight: bold;
}

.green {
background: #22c55e;
color: black;
}

.blue {
background: #3b82f6;
color: white;
}

.orange {
background: #f59e0b;
color: black;
}

.purple {
background: #8b5cf6;
color: white;
}

.red {
background: #ef4444;
color: white;
}

.row {
margin-top: 10px;
}
</style>
</head>
<body>

<h1>NLN Dispatch Dashboard 🚀</h1>

<div class="card">
<h3>Create Lead</h3>

<input id="name" placeholder="Customer Name" />
<input id="phone" placeholder="Phone" />
<input id="service" placeholder="Service" />
<input id="location" placeholder="Location" />

<button class="green" onclick="createLead()">Create Lead</button>
</div>

<div id="leads"></div>

<script>
async function loadLeads() {
const res = await fetch("/api/leads");
const leads = await res.json();

const container = document.getElementById("leads");
container.innerHTML = "";

leads.forEach(lead => {
const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<b>${lead.name}</b><br>
📞 ${lead.phone}<br>
🔧 ${lead.service}<br>
📍 ${lead.location}<br>
Status: ${lead.status}<br>
Tech: ${lead.technician}<br>
Time: ${lead.createdAt}<br>

<div class="row">
<button class="green" onclick="acceptLead(${lead.id})">Accept</button>

<select id="tech-${lead.id}">
<option value="Larry">Larry</option>
<option value="Eli">Eli</option>
<option value="Max">Max</option>
</select>

<button class="blue" onclick="assignLead(${lead.id})">Assign</button>
<button class="orange" onclick="sendSMS(${lead.id})">SMS</button>
<button class="purple" onclick="completeLead(${lead.id})">Complete</button>
<button class="red" onclick="cancelLead(${lead.id})">Cancel</button>
</div>
`;

container.appendChild(div);
});
}

async function createLead() {
const res = await fetch("/api/new-lead", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
service: document.getElementById("service").value,
location: document.getElementById("location").value
})
});

const data = await res.json();

if (data.success) {
loadLeads();
} else {
alert("Create lead failed");
}
}

async function acceptLead(id) {
await fetch(`/api/accept/${id}`, {
method: "POST"
});
loadLeads();
}

async function assignLead(id) {
const tech = document.getElementById(`tech-${id}`).value;

await fetch(`/api/assign/${id}`, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ technician: tech })
});

loadLeads();
}

async function sendSMS(id) {
const res = await fetch(`/api/sms/${id}`, {
method: "POST"
});

const data = await res.json();
alert(data.message || "SMS done");
}

async function completeLead(id) {
await fetch(`/api/complete/${id}`, {
method: "POST"
});
loadLeads();
}

async function cancelLead(id) {
await fetch(`/api/cancel/${id}`, {
method: "POST"
});
loadLeads();
}

loadLeads();
</script>

</body>
</html>
