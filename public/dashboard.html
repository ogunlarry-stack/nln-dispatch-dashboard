<!DOCTYPE html>
<html>
<head>
<title>NLN Dashboard</title>
</head>

<body>

<h1>NLN Dispatch Dashboard</h1>

<button onclick="createTestLead()">+ Add Test Lead</button>

<div id="leads"></div>

<script>

async function loadLeads() {
const res = await fetch('/api/leads');
const data = await res.json();

const box = document.getElementById('leads');
box.innerHTML = '';

data.forEach(lead => {
const div = document.createElement('div');

div.innerHTML = `
<hr>
<h3>${lead.name}</h3>
<p>${lead.service}</p>
<p>${lead.location}</p>
<p>Status: ${lead.status}</p>

<button onclick="accept(${lead.id})">Accept</button>
<button onclick="complete(${lead.id})">Complete</button>
<button onclick="cancel(${lead.id})">Cancel</button>
`;

box.appendChild(div);
});
}

async function createTestLead() {
await fetch('/api/new-lead', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({
name: "Test Customer",
phone: "123",
service: "Lockout",
location: "Edgewood"
})
});

loadLeads();
}

async function accept(id) {
await fetch('/api/accept/' + id, { method: 'POST' });
loadLeads();
}

async function complete(id) {
await fetch('/api/complete/' + id, { method: 'POST' });
loadLeads();
}

async function cancel(id) {
await fetch('/api/cancel/' + id, { method: 'POST' });
loadLeads();
}

loadLeads();

</script>

</body>
</html>
